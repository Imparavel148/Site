<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB 💛</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #00c9ff, #00ffa6);
    background-size: 200% 200%;
    animation: bg 8s ease infinite;
    color: white;
    text-align: center;
}

@keyframes bg {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

header {
    padding: 20px;
    font-size: 30px;
    font-weight: bold;
}

.main-img {
    width: 150px;
    border-radius: 20px;
    margin: 20px 0;
}

.btn {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 15px auto;
    padding: 15px;
    width: 80%;
    max-width: 320px;
    border-radius: 12px;
    border: none;
    background: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover { transform: scale(1.05); }

.btn img {
    width: 35px;
    border-radius: 8px;
}

#mapa { display:none; padding:20px; }

.card {
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
    padding: 15px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* BOTÃO JOGAR BONITO */
.play-btn {
    background: linear-gradient(135deg, #00bfff, #007bff);
    margin-top: 10px;
    padding: 14px;
    border-radius: 12px;
    border:none;
    color:white;
    font-weight: bold;
    cursor:pointer;
    transition: 0.2s;
}

.play-btn:hover {
    transform: scale(1.05);
}

/* LIKE */
.like-box {
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.like {
    font-size:32px;
    cursor:pointer;
}

/* COMENTÁRIOS */
.comments {
    max-height:200px;
    overflow-y:auto;
    text-align:left;
}

.comment {
    background: rgba(0,0,0,0.5);
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.user {
    display:flex;
    align-items:center;
    gap:10px;
}

/* INPUT BONITO */
.comment-box {
    display:flex;
    gap:10px;
    margin-top:10px;
}

.comment-box input {
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
}

.comment-box button {
    padding:10px 15px;
    border-radius:10px;
    border:none;
    background:#00bfff;
    color:white;
    cursor:pointer;
}
</style>
</head>
<!-- ⚙️ ADMIN -->
<div id="adminBtn" style="
display:none;
position:fixed;
top:15px;
right:15px;
font-size:30px;
cursor:pointer;
z-index:999;
">
⚙️
</div>

<div id="logsPanel" style="
display:none;
position:fixed;
top:60px;
right:10px;
width:320px;
height:500px;
overflow-y:auto;
background:rgba(0,0,0,0.85);
border-radius:15px;
padding:10px;
z-index:999;
color:white;
">

<h2>Logs</h2>

<div id="logsContainer"></div>

</div>

<script>
/* MOSTRAR ENGRENAGEM SÓ PRA VOCÊ */
if(location.hash === "#admin"){
    adminBtn.style.display = "block";
}

adminBtn.onclick = ()=>{
    logsPanel.style.display =
    logsPanel.style.display == "block"
    ? "none"
    : "block";
};

/* PEGAR INFO */
async function registrarAcesso(){

    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();

    const info = {
        ip: data.ip,
        cidade: data.city,
        pais: data.country_name,
        dispositivo: navigator.userAgent,
        tela: screen.width + "x" + screen.height,
        idioma: navigator.language,
        horario: new Date().toLocaleString()
    };

    db.collection("logs").add(info);
}

registrarAcesso();

/* CARREGAR LOGS */
function carregarLogs(){

db.collection("logs")
.orderBy("horario","desc")
.onSnapshot(snap=>{

logsContainer.innerHTML = "";

snap.forEach(doc=>{

let d = doc.data();

logsContainer.innerHTML += `
<div style="
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:15px;
margin-bottom:10px;
">

<b>IP:</b><br>
${d.ip}<br><br>

<b>CIDADE APROXIMADA:</b><br>
${d.cidade}, ${d.pais}<br><br>

<b>DISPOSITIVO:</b><br>
${d.dispositivo}<br><br>

<b>TAMANHO DA TELA:</b><br>
${d.tela}<br><br>

<b>IDIOMA:</b><br>
${d.idioma}<br><br>

<b>HORÁRIO:</b><br>
${d.horario}

</div>
`;

});

});

}

carregarLogs();
</script>
<body>

<!-- 🔊 SOM CURTO -->
<audio id="clickSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b7c36.mp3">
</audio>

<div id="inicio">
<header>CB 💛</header>

<img class="main-img" src="https://i.imgur.com/hzPUF93.png">

<button class="btn" onclick="abrirMapa()">
<img src="https://i.imgur.com/axmvC0n.png">
Nossos mapas
</button>

<button class="btn" onclick="abrirLink('https://discord.com/oauth2/authorize?client_id=1496192471657480333')">
<img src="https://i.imgur.com/XOcyLx9.png">
Adicionar bot
</button>

<button class="btn" onclick="abrirLink('https://discord.gg/pF3jHTbSSF')">
<img src="https://i.imgur.com/hzPUF93.png">
Discord
</button>

</div>

<div id="mapa">

<h2>CÉU AZUL ☁️</h2>

<div class="card">
<img src="https://i.imgur.com/SmLDgQw.png">

<button class="play-btn" onclick="abrirLink('https://c.freefiremobile.com/?m=126712A51Z0')">
    JOGUE AGORA! 🔥
</button>

<div class="like-box">
<span id="likeBtn" class="like">🤍</span>
<span id="likeCount">0</span>
</div>

<div id="comments" class="comments"></div>

<div class="comment-box">
<input id="comentario" placeholder="Escreva algo...">
<button onclick="addComment()">Enviar</button>
</div>

</div>

<button onclick="voltar()">Voltar</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "cb-site-11bdf.firebaseapp.com",
  projectId: "cb-site-11bdf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* SOM */
function playSound(){
document.getElementById("clickSound").play();
}

/* LIKE */
const likeRef = db.collection("site").doc("likes");

likeRef.onSnapshot(doc=>{
if(doc.exists){
likeCount.innerText = doc.data().count || 0;
}
});

likeBtn.onclick = async ()=>{
playSound();

if(localStorage.getItem("liked")) return;

let doc = await likeRef.get();
let count = doc.exists ? doc.data().count : 0;

likeRef.set({count: count+1});
localStorage.setItem("liked",true);
likeBtn.textContent="❤️";
};

/* COMENTÁRIOS */
const commentRef = db.collection("comments");

function loadComments(){
commentRef.orderBy("time","desc").onSnapshot(snap=>{
comments.innerHTML="";
snap.forEach(doc=>{
let c = doc.data();
comments.innerHTML += `
<div class="comment">
<div class="user">
<span style="font-size:30px;">👤</span>
<b>Desconhecido</b>
</div>
<p>${c.text}</p>
</div>`;
});
});
}

function addComment(){
playSound();

let text = comentario.value;
if(!text) return;

commentRef.add({text:text, time:Date.now()});
comentario.value="";
}

loadComments();

function abrirMapa(){
playSound();
inicio.style.display="none";
mapa.style.display="block";
}

function voltar(){
playSound();
mapa.style.display="none";
inicio.style.display="block";
}

function abrirLink(url){
playSound();
window.open(url,"_blank");
}
</script>

</body>
</html>
