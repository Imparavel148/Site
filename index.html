<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB 💛</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #00c9ff, #00ffa6);
    background-size: 200% 200%;
    animation: bg 8s ease infinite;
    color: white;
    text-align: center;
}

@keyframes bg {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

.fade {
    animation: fade 0.4s ease;
}

@keyframes fade {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1;}
}

header {
    padding: 20px;
    font-size: 30px;
    font-weight: bold;
}

.main-img {
    width: 150px;
    border-radius: 20px;
    margin: 20px 0;
}

.btn {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 15px auto;
    padding: 15px;
    width: 80%;
    max-width: 320px;
    border-radius: 12px;
    border: none;
    background: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.05);
}

.btn img {
    width: 35px;
    border-radius: 8px;
}

#mapa { display:none; padding:20px; }

.card {
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
    padding: 15px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.play-btn {
    background: #00bfff;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border:none;
    color:white;
    cursor:pointer;
}

.like { font-size:28px; cursor:pointer; }

.comments {
    max-height:200px;
    overflow-y:auto;
    text-align:left;
}

.comment {
    background: rgba(0,0,0,0.5);
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.user {
    display:flex;
    gap:10px;
}

.user img {
    width:40px;
    border-radius:50%;
}
</style>
</head>

<body>

<!-- 🔊 SOM -->
<audio id="bgMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div id="inicio" class="fade">
<header>CB 💛</header>

<img class="main-img" src="https://i.imgur.com/hzPUF93.png">

<button class="btn" onclick="abrirMapa()">
<img src="https://i.imgur.com/XOcyLx9.png">
Nossos mapas
</button>

<button class="btn" onclick="abrirLink('https://discord.com/oauth2/authorize?client_id=1496192471657480333')">
<img src="https://i.imgur.com/hzPUF93.png">
Adicionar bot
</button>

<button class="btn" onclick="abrirLink('https://discord.gg/pF3jHTbSSF')">
<img src="https://i.imgur.com/axmvC0n.png">
Discord
</button>

</div>

<div id="mapa" class="fade">

<h2>CÉU AZUL ☁️</h2>

<div class="card">
<img src="https://i.imgur.com/SmLDgQw.png">

<button class="play-btn">Jogar 🎮</button>

<div>
<span id="likeBtn" class="like">🤍</span>
<span id="likeCount">0</span>
</div>

<div id="comments" class="comments"></div>

<input id="comentario">
<button onclick="addComment()">Enviar</button>

</div>

<button onclick="voltar()">Voltar</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "cb-site-11bdf.firebaseapp.com",
  projectId: "cb-site-11bdf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* SOM */
document.body.addEventListener("click",()=>{
document.getElementById("bgMusic").play();
},{once:true});

/* LIKE ANTI-SPAM */
const likeRef = db.collection("site").doc("likes");

likeRef.onSnapshot(doc=>{
if(doc.exists){
likeCount.innerText = doc.data().count || 0;
}
});

likeBtn.onclick = async ()=>{
if(localStorage.getItem("liked")) return alert("Você já deu like");

let doc = await likeRef.get();
let count = doc.exists ? doc.data().count : 0;

likeRef.set({count: count+1});
localStorage.setItem("liked",true);
likeBtn.textContent="❤️";
};

/* COMENTÁRIOS ANTI-SPAM */
const commentRef = db.collection("comments");

function loadComments(){
commentRef.orderBy("time","desc").onSnapshot(snap=>{
comments.innerHTML="";
snap.forEach(doc=>{
let c = doc.data();
comments.innerHTML += `
<div class="comment">
<div class="user">
<img src="https://i.imgur.com/8Km9tLL.png">
<b>Desconhecido</b>
</div>
<p>${c.text}</p>
</div>`;
});
});
}

function addComment(){
let text = comentario.value;

if(!text) return;

let now = Date.now();
let last = JSON.parse(localStorage.getItem("times")||"[]");

// limpa antigos
last = last.filter(t=> now - t < 3600000);

if(last.length >= 3){
alert("Limite de 3 comentários por hora");
return;
}

last.push(now);
localStorage.setItem("times",JSON.stringify(last));

commentRef.add({text:text, time:now});
comentario.value="";
}

loadComments();

function abrirMapa(){
inicio.style.display="none";
mapa.style.display="block";
}

function voltar(){
mapa.style.display="none";
inicio.style.display="block";
}

function abrirLink(url){
window.open(url,"_blank");
}
</script>

</body>
    </html>
