<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB 💛</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, orange, yellow);
    color: white;
    text-align: center;
}

header {
    padding: 20px;
    font-size: 30px;
    font-weight: bold;
}

.main-img {
    width: 200px;
    border-radius: 20px;
    margin: 20px 0;
}

.btn {
    display: block;
    margin: 15px auto;
    padding: 15px;
    width: 80%;
    max-width: 300px;
    border-radius: 10px;
    border: none;
    font-size: 18px;
    cursor: pointer;
    background: black;
    color: white;
}

#mapa {
    display: none;
    padding: 20px;
}

.card {
    background: #111;
    border-radius: 15px;
    padding: 15px;
    margin-top: 20px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.play-btn {
    background: red;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.voltar {
    margin-top: 20px;
    padding: 10px;
    background: black;
    color: white;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div id="inicio">
    <header>CB 💛</header>

    <!-- IMAGEM CENTRAL -->
    <img class="main-img" src="https://i.imgur.com/hzPUF93.png">

    <button class="btn" onclick="abrirMapa()">Nossos mapas</button>

    <!-- BOT -->
    <button class="btn" onclick="abrirLink('https://discord.com/oauth2/authorize?client_id=1496192471657480333&permissions=8&response_type=code&redirect_uri=https%3A%2F%2Fdiscord.com%2Foauth2%2Fauthorize%3Fclient_id%3D1496192471657480333&integration_type=0&scope=bot+presences.read+messages.read')">
        Adicionar nosso bot
    </button>

    <!-- DISCORD -->
    <button class="btn" onclick="abrirLink('https://discord.gg/pF3jHTbSSF')">
        Nosso Discord
    </button>
</div>

<div id="mapa">

    <h2>Mapas</h2>

    <!-- MAPA 1 -->
    <div class="card">
        <img src="https://i.imgur.com/XOcyLx9.png">
        <h3>Mapa 2x2</h3>
        <button class="play-btn" onclick="abrirLink('LINK_DO_JOGO_1')">
            Jogar agora 🔥
        </button>
    </div>

    <!-- MAPA 2 -->
    <div class="card">
        <img src="https://i.imgur.com/SmLDgQw.png">
        <h3>Outro Mapa</h3>
        <button class="play-btn" onclick="abrirLink('LINK_DO_JOGO_2')">
            Jogar agora 🔥
        </button>
    </div>

    <button class="voltar" onclick="voltar()">Voltar</button>

</div>

<script>
function abrirMapa(){
    document.getElementById("inicio").style.display = "none";
    document.getElementById("mapa").style.display = "block";
}

function voltar(){
    document.getElementById("mapa").style.display = "none";
    document.getElementById("inicio").style.display = "block";
}

function abrirLink(url){
    window.open(url, "_blank");
}
</script>

</body>
  </html>
