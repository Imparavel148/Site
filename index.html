<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB 💛</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(-45deg, #ff8c00, #ffd700, #ff5e00, #ffaa00);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    color: white;
    text-align: center;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

header {
    padding: 20px;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 10px black;
}

.main-img {
    width: 200px;
    border-radius: 20px;
    margin: 20px 0;
    box-shadow: 0 0 20px black;
}

/* BOTÕES BONITOS */
.btn {
    display: block;
    margin: 15px auto;
    padding: 15px;
    width: 80%;
    max-width: 300px;
    border-radius: 15px;
    border: none;
    font-size: 18px;
    cursor: pointer;
    background: rgba(0,0,0,0.7);
    color: white;
    backdrop-filter: blur(5px);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.07);
    background: rgba(0,0,0,0.9);
}

/* ANIMAÇÃO DE PÁGINA */
.fade {
    animation: fade 0.5s;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* MAPA */
#mapa {
    display: none;
    padding: 20px;
}

.card {
    background: rgba(0,0,0,0.7);
    border-radius: 15px;
    padding: 15px;
    margin-top: 20px;
    backdrop-filter: blur(5px);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.play-btn {
    background: red;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.play-btn:hover {
    transform: scale(1.05);
    background: darkred;
}

.voltar {
    margin-top: 20px;
    padding: 10px;
    background: black;
    color: white;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔊 MÚSICA DE FUNDO -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div id="inicio" class="fade">
    <header>CB 💛</header>

    <img class="main-img" src="https://i.imgur.com/hzPUF93.png">

    <button class="btn" onclick="abrirMapa()">Nossos mapas</button>

    <button class="btn" onclick="abrirLink('https://discord.com/oauth2/authorize?client_id=1496192471657480333&permissions=8&scope=bot')">
        Adicionar nosso bot
    </button>

    <button class="btn" onclick="abrirLink('https://discord.gg/pF3jHTbSSF')">
        Nosso Discord
    </button>
</div>

<div id="mapa" class="fade">

    <h2>Mapas 🔥</h2>

    <div class="card">
        <img src="https://i.imgur.com/XOcyLx9.png">
        <h3>Mapa 2x2</h3>
        <button class="play-btn">Jogar agora 🔥</button>
    </div>

    <div class="card">
        <img src="https://i.imgur.com/SmLDgQw.png">
        <h3>Outro Mapa</h3>
        <button class="play-btn">Jogar agora 🔥</button>
    </div>

    <button class="voltar" onclick="voltar()">Voltar</button>

</div>

<script>
function abrirMapa(){
    document.getElementById("inicio").style.display = "none";
    let mapa = document.getElementById("mapa");
    mapa.style.display = "block";
    mapa.classList.add("fade");
}

function voltar(){
    document.getElementById("mapa").style.display = "none";
    let inicio = document.getElementById("inicio");
    inicio.style.display = "block";
    inicio.classList.add("fade");
}

function abrirLink(url){
    window.open(url, "_blank");
}
</script>

</body>
</html>
