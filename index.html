<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB 💛</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#00c9ff,#00ffa6);
    background-size:200% 200%;
    animation:bg 8s ease infinite;
    color:white;
    text-align:center;
}

@keyframes bg{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

header{
    padding:20px;
    font-size:30px;
    font-weight:bold;
}

.main-img{
    width:150px;
    border-radius:20px;
    margin:20px 0;
}

.btn{
    display:flex;
    align-items:center;
    gap:15px;
    margin:15px auto;
    padding:15px;
    width:80%;
    max-width:320px;
    border:none;
    border-radius:15px;
    background:rgba(0,0,0,0.6);
    color:white;
    cursor:pointer;
    transition:.2s;
    font-size:16px;
}

.btn:hover{ transform:scale(1.05); }

.btn img{
    width:38px;
    border-radius:10px;
}

#mapa{
    display:none;
    padding:20px;
}

.card{
    background:rgba(0,0,0,0.6);
    border-radius:15px;
    padding:15px;
}

.card img{
    width:100%;
    border-radius:12px;
}

.play-btn{
    width:100%;
    margin-top:12px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#00bfff,#007bff);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.like-box{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:15px;
}

.like{ font-size:38px; cursor:pointer; }

.comments{
    max-height:220px;
    overflow-y:auto;
    text-align:left;
    margin-top:15px;
}

.comment{
    background:rgba(255,255,255,0.1);
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
}

.user{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:5px;
}

.comment-box{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.comment-box input{
    flex:1;
    border:none;
    border-radius:12px;
    padding:12px;
    outline:none;
}

.comment-box button{
    border:none;
    border-radius:12px;
    background:#00bfff;
    color:white;
    padding:12px 16px;
    cursor:pointer;
}

.back-btn{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:black;
    color:white;
    cursor:pointer;
}

/* LOGIN */
#loginScreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(135deg,#FFD700,#FF7A00);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
text-align:center;
background:rgba(0,0,0,0.35);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
width:85%;
max-width:360px;
}

.login-box button{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#5865F2;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="login-box">

<h2>Faça o login obrigatório 💛</h2>
<p>Para desfrutar do nosso site</p>

<button onclick="loginDiscord()">
<img src="https://i.imgur.com/XOcyLx9.png" style="width:24px;">
Entrar com Discord
</button>

</div>
</div>

<!-- INICIO -->
<div id="inicio">

<header>CB 💛</header>

<img class="main-img" src="https://i.imgur.com/hzPUF93.png">

<button class="btn" onclick="abrirMapa()">
<img src="https://i.imgur.com/axmvC0n.png">
Nossos mapas
</button>

<button class="btn" onclick="window.open('https://discord.gg/pF3jHTbSSF')">
<img src="https://i.imgur.com/hzPUF93.png">
Discord
</button>

</div>

<!-- MAPA -->
<div id="mapa">

<h2>CÉU AZUL ☁️</h2>

<div class="card">

<img src="https://i.imgur.com/SmLDgQw.png">

<button class="play-btn">JOGUE AGORA! 🔥</button>

<div class="like-box">
<span id="likeBtn" class="like">🤍</span>
<span id="likeCount">0</span>
</div>

<div id="comments" class="comments"></div>

<div class="comment-box">
<input id="comentario" placeholder="Escreva algo...">
<button onclick="addComment()">Enviar</button>
</div>

</div>

<button class="back-btn" onclick="voltar()">Voltar</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCrsTQooML2ukLzLT6zwKvnhjohG9DJA0c",
authDomain:"cb-site-11bdf.firebaseapp.com",
projectId:"cb-site-11bdf"
});

const db = firebase.firestore();

/* DISCORD LOGIN */
const CLIENT_ID = "1496192471657480333";
const REDIRECT = window.location.origin + window.location.pathname;

let currentUser = null;

function loginDiscord(){
window.location.href =
`https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT)}&scope=identify`;
}

async function getUser(token){
const res = await fetch("https://discord.com/api/users/@me",{
headers:{Authorization:`Bearer ${token}`}
});
return await res.json();
}

async function init(){

const hash = window.location.hash;

if(hash.includes("access_token")){
const token = new URLSearchParams(hash.replace("#","")).get("access_token");
const user = await getUser(token);

currentUser = {
name:user.global_name||user.username,
avatar:`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
};

localStorage.setItem("dc_user",JSON.stringify(currentUser));
}

const saved = localStorage.getItem("dc_user");

if(saved){
currentUser = JSON.parse(saved);
loginScreen.style.display="none";
inicio.style.display="block";
}else{
loginScreen.style.display="flex";
inicio.style.display="none";
}

}

init();

/* COMENTÁRIOS */
const commentRef = db.collection("comments");

function loadComments(){

commentRef.orderBy("time","desc").onSnapshot(snap=>{

comments.innerHTML="";

snap.forEach(doc=>{
let c=doc.data();

comments.innerHTML+=`
<div class="comment">

<div class="user">
<img src="${c.avatar}" style="width:32px;height:32px;border-radius:50%;">
<b>${c.name}</b>
</div>

<p>${c.text}</p>

</div>
`;
});

});

}

function addComment(){

let text = comentario.value;
if(!text) return;

commentRef.add({
text:text,
time:Date.now(),
name:currentUser?.name,
avatar:currentUser?.avatar
});

comentario.value="";
}

loadComments();

/* NAV */
function abrirMapa(){
inicio.style.display="none";
mapa.style.display="block";
}

function voltar(){
mapa.style.display="none";
inicio.style.display="block";
}
</script>

</body>
    </html>
