<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB 💛</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #00c9ff, #00ffa6);
    color: white;
    text-align: center;
}

header {
    padding: 20px;
    font-size: 30px;
    font-weight: bold;
}

/* BOTÕES COM IMAGEM */
.btn-img {
    position: relative;
    margin: 15px auto;
    width: 80%;
    max-width: 300px;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
}

.btn-img img {
    width: 100%;
}

.btn-img span {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-weight: bold;
}

/* MAPA */
#mapa {
    display: none;
    padding: 20px;
}

.card {
    background: rgba(0,0,0,0.5);
    border-radius: 15px;
    padding: 15px;
}

/* LIKE */
.like {
    font-size: 30px;
    cursor: pointer;
}

/* COMENTÁRIOS */
.comments {
    max-height: 200px;
    overflow-y: scroll;
    text-align: left;
}

.comment {
    background: rgba(0,0,0,0.5);
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.user {
    display: flex;
    gap: 10px;
}

.user img {
    width: 40px;
    border-radius: 50%;
}
</style>
</head>

<body>

<div id="inicio">
    <header>CB 💛</header>

    <div class="btn-img" onclick="abrirMapa()">
        <img src="https://i.imgur.com/XOcyLx9.png">
        <span>Nossos mapas</span>
    </div>

    <div class="btn-img" onclick="abrirLink('https://discord.com/oauth2/authorize?client_id=1496192471657480333')">
        <img src="https://i.imgur.com/hzPUF93.png">
        <span>Adicionar bot</span>
    </div>

    <div class="btn-img" onclick="abrirLink('https://discord.gg/pF3jHTbSSF')">
        <img src="https://i.imgur.com/axmvC0n.png">
        <span>Discord</span>
    </div>
</div>

<div id="mapa">

    <h2 style="color:#b0faff;">CÉU AZUL ☁️</h2>

    <div class="card">
        <img src="https://i.imgur.com/SmLDgQw.png">

        <div>
            <span id="likeBtn" class="like">🤍</span>
            <span id="likeCount">0</span>
        </div>

        <div class="comments" id="comments"></div>

        <input id="comentario" placeholder="Comentário...">
        <button onclick="addComment()">Enviar</button>
    </div>

    <button onclick="voltar()">Voltar</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCrsTQooML2ukLzLT6zwKvnhjohG9DJA0c",
  authDomain: "cb-site-11bdf.firebaseapp.com",
  projectId: "cb-site-11bdf",
  storageBucket: "cb-site-11bdf.firebasestorage.app",
  messagingSenderId: "944676301147",
  appId: "1:944676301147:web:cbd07e9916fde4aba4d27e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* LIKE GLOBAL */
const likeRef = db.collection("site").doc("likes");

likeRef.onSnapshot(doc => {
    if(doc.exists){
        document.getElementById("likeCount").innerText = doc.data().count || 0;
    }
});

document.getElementById("likeBtn").onclick = async () => {
    let doc = await likeRef.get();
    let count = doc.exists ? doc.data().count : 0;
    likeRef.set({count: count + 1});
};

/* COMENTÁRIOS GLOBAL */
const commentRef = db.collection("comments");

function loadComments(){
    commentRef.onSnapshot(snapshot => {
        let box = document.getElementById("comments");
        box.innerHTML = "";

        snapshot.forEach(doc => {
            let c = doc.data().text;

            box.innerHTML += `
            <div class="comment">
                <div class="user">
                    <img src="https://i.imgur.com/8Km9tLL.png">
                    <b>Desconhecido</b>
                </div>
                <p>${c}</p>
            </div>`;
        });
    });
}

function addComment(){
    let input = document.getElementById("comentario");
    let text = input.value;

    if(text){
        commentRef.add({ text: text });
        input.value = "";
    }
}

loadComments();

function abrirMapa(){
    document.getElementById("inicio").style.display = "none";
    document.getElementById("mapa").style.display = "block";
}

function voltar(){
    document.getElementById("mapa").style.display = "none";
    document.getElementById("inicio").style.display = "block";
}

function abrirLink(url){
    window.open(url, "_blank");
}
</script>

</body>
</html>
