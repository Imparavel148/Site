<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#admin</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e0f13;
  color: white;
}

/* topo */
.topbar {
  background: #1a1b22;
  padding: 14px 20px;
  font-weight: bold;
  font-size: 18px;
  border-bottom: 1px solid #2a2b33;
}

/* layout geral */
.container {
  display: flex;
  height: calc(100vh - 50px);
}

/* sidebar estilo discord */
.sidebar {
  width: 75px;
  background: #12131a;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 10px;
  gap: 12px;
  border-right: 1px solid #22232b;
}

.icon {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #2b2d36;
}

/* área principal */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* destaque do canal */
.banner {
  background: linear-gradient(135deg, #ff7a00, #ffcc00);
  color: black;
  padding: 15px;
  border-radius: 10px;
  font-weight: bold;
  margin-bottom: 15px;
}

/* post */
.post {
  background: #1a1b22;
  border: 1px solid #2a2b33;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #333;
}

.username {
  font-weight: bold;
  color: #ffcc66;
}

.post img.content {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 15px;
  font-size: 13px;
  color: #aaa;
}

.actions button {
  background: none;
  border: none;
  color: #aaa;
  cursor: pointer;
}

.actions button:hover {
  color: white;
}
</style>
</head>

<body>

<div class="topbar">#admin</div>

<div class="container">

  <div class="sidebar">
    <div class="icon"></div>
    <div class="icon"></div>
    <div class="icon"></div>
  </div>

  <div class="main">

    <div class="banner">
      📌 Canal administrativo ativo
    </div>

    <!-- POST PRINCIPAL (igual da imagem) -->
    <div class="post">

      <div class="post-header">
        <div class="avatar"></div>
        <div class="username">Admin</div>
      </div>

      <div>
        Interface principal do sistema #admin
      </div>

      <img class="content" src="https://i.imgur.com/GtsSqgS.png">

      <div class="actions">
        <button>👍 Curtir</button>
        <button>💬 Comentar</button>
        <button>↗ Compartilhar</button>
      </div>

    </div>

    <!-- outro post -->
    <div class="post">
      <div class="post-header">
        <div class="avatar"></div>
        <div class="username">Sistema</div>
      </div>

      Funcionamento ativo e estável.

      <div class="actions">
        <button>👍 Curtir</button>
        <button>💬 Comentar</button>
      </div>
    </div>

  </div>

</div>

</body>
</html>
