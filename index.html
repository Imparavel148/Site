<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB 💛 Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(135deg,#ffcc00,#ff6a00,#00c9ff);
background-size:300% 300%;
animation:bg 10s ease infinite;
text-align:center;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* LOGIN */
#loginScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#FFD700,#FF7A00);
z-index:9999;
}

.loginBox{
background:rgba(0,0,0,0.35);
padding:30px;
border-radius:20px;
width:85%;
max-width:360px;
backdrop-filter:blur(10px);
}

.loginBox button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#5865F2;
color:white;
font-weight:bold;
cursor:pointer;
}

/* HEADER */
header{
padding:20px;
font-size:32px;
font-weight:bold;
}

/* BOTÕES */
.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin:10px auto;
padding:14px;
border:none;
border-radius:14px;
width:90%;
max-width:320px;
background:rgba(0,0,0,0.6);
color:white;
cursor:pointer;
transition:.2s;
}

.btn:hover{transform:scale(1.05);}

.discordBtn{
background:#5865F2;
}

/* MAPA */
#mapa{
display:none;
padding:20px;
}

/* LOGS PANEL */
#logsPanel{
position:fixed;
top:0;
right:0;
width:360px;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
padding:15px;
z-index:9999;
}

.logItem{
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:12px;
margin-bottom:10px;
text-align:left;
}

.logHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:5px;
}

.logHeader img{
width:32px;
height:32px;
border-radius:50%;
}

.backBtn{
margin-top:auto;
padding:12px;
border:none;
border-radius:12px;
background:#ff4444;
color:white;
cursor:pointer;
}

.adminBtn{
position:fixed;
top:15px;
right:15px;
font-size:28px;
cursor:pointer;
z-index:999;
display:none;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="loginBox">
<h2>Faça login obrigatório 💛</h2>
<p>Entre com Discord para continuar</p>

<button onclick="loginDiscord()">
Entrar com Discord
</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminBtn" class="adminBtn">⚙️</div>

<!-- HEADER -->
<header>CB 💛</header>

<!-- HOME -->
<div id="inicio">

<button class="btn" onclick="abrirMapa()">📍 Nossos mapas</button>

<button class="btn discordBtn"
onclick="window.open('https://discord.com/oauth2/authorize?client_id=1496192471657480333&permissions=8&scope=bot%20applications.commands','_blank')">
🤖 Adicionar bot
</button>

<button class="btn"
onclick="window.open('https://discord.gg/pF3jHTbSSF')">
💬 Discord
</button>

</div>

<!-- MAPA -->
<div id="mapa">

<h2>CÉU AZUL ☁️</h2>

<div class="btn discordBtn">JOGAR AGORA 🔥</div>

<button class="btn" onclick="voltar()">Voltar</button>

</div>

<!-- LOGS -->
<div id="logsPanel">

<h2>📜 LOGS</h2>

<div id="logsContainer" style="overflow-y:auto;height:100%;"></div>

<button class="backBtn" onclick="fecharLogs()">Voltar</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyCrsTQooML2ukLzLT6zwKvnhjohG9DJA0c",
authDomain:"cb-site-11bdf.firebaseapp.com",
projectId:"cb-site-11bdf"
});

const db=firebase.firestore();

/* LOGIN DISCORD */
const CLIENT_ID="1496192471657480333";
const REDIRECT=window.location.origin+window.location.pathname;

let currentUser=null;

function loginDiscord(){
window.location.href=
`https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT)}&scope=identify`;
}

async function getUser(token){
const res=await fetch("https://discord.com/api/users/@me",{
headers:{Authorization:`Bearer ${token}`}
});
return res.json();
}

async function init(){

const hash=window.location.hash;

if(hash.includes("access_token")){
const token=new URLSearchParams(hash.replace("#","")).get("access_token");
const user=await getUser(token);

currentUser={
name:user.global_name||user.username,
avatar:`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
};

localStorage.setItem("dc_user",JSON.stringify(currentUser));
}

if(localStorage.getItem("dc_user")){
currentUser=JSON.parse(localStorage.getItem("dc_user"));
loginScreen.style.display="none";
}else{
loginScreen.style.display="flex";
}

/* ADMIN MODE */
const isAdmin = location.hash === "#admin";

if(isAdmin){
document.getElementById("adminBtn").style.display="block";
}

adminBtn.onclick=()=>{

if(!isAdmin){
alert("Acesso negado");
return;
}

logsPanel.style.display="flex";
carregarLogs();

};

/* GARANTE START CORRETO */
document.getElementById("inicio").style.display="block";
document.getElementById("mapa").style.display="none";

}

init();

/* MAPA FUNCIONANDO */
function abrirMapa(){
document.getElementById("inicio").style.display="none";
document.getElementById("mapa").style.display="block";
window.scrollTo(0,0);
}

function voltar(){
document.getElementById("mapa").style.display="none";
document.getElementById("inicio").style.display="block";
window.scrollTo(0,0);
}

/* LOGS */
function fecharLogs(){
logsPanel.style.display="none";
}

function carregarLogs(){

db.collection("logs")
.orderBy("horario","desc")
.onSnapshot(snap=>{

logsContainer.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

logsContainer.innerHTML+=`
<div class="logItem">

<div class="logHeader">
<img src="${d.avatar||''}">
<b>${d.name||"Desconhecido"}</b>
</div>

📡 ${d.ip||""}<br>
🌎 ${d.cidade||""}, ${d.pais||""}<br>
💻 ${d.dispositivo||""}<br>
🕒 ${new Date(d.horario).toLocaleString()}

</div>
`;
});

});

}

</script>

</body>
</html>
